---
aid: mcgill
name: McGill University
description: >-
  McGill University is a public research university in Montreal, Quebec, Canada,
  ranked #64 in the QS World University Rankings 2025. Its public, machine-readable
  developer footprint is centered on research-data infrastructure rather than a
  unified developer portal: the McGill University Dataverse is published through the
  Borealis (Scholars Portal) Dataverse platform, which exposes the full Dataverse
  Native and Search REST APIs over the McGill collection. Identity is federated
  through a Shibboleth SAML single sign-on service. Most other institutional systems
  (course catalogue, Minerva/Banner registration, library discovery) are gated behind
  authentication or web UIs and do not publish open, documented public APIs.
