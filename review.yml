reviews:
  - date: '2026-06-03'
    rating: 2
    summary: >-
      McGill has no unified, open public developer portal. The strongest verifiable
      public API surface is the McGill University Dataverse, hosted on the Borealis
      (Scholars Portal) Dataverse platform, which exposes the standard Dataverse
      Native and Search REST APIs over the McGill collection - both confirmed live
      (GET /api/dataverses/mcgill returned a McGill collection JSON record; /api/search
      returned 200). A Shibboleth SAML IdP for SSO is live but is an identity service,
      not an open data API. An Azure API Management developer portal hostname surfaced
      in search but did not resolve (connection refused), so it is not cataloged. A
      github.com/mcgill org exists but has zero public repos and could not be verified
      as officially McGill-owned, so it is not used as a pointer. An "eScholarship"
      OAI-PMH path returned a SPA landing page rather than valid OAI-PMH XML, so it is
      not cataloged. No fabricated endpoints; only live-verified surfaces included.
    endpoints:
      - url: https://borealisdata.ca/api/dataverses/mcgill
        status: 200
        note: Dataverse Native API - returned live JSON for the McGill University Dataverse collection.
      - url: https://borealisdata.ca/api/search?q=mcgill&per_page=1
